  <circle cx="75" cy="105" r="10" fill="white"/>
  <circle cx="75" cy="105" r="6" fill="#1a237e"/>
  <circle cx="77" cy="103" r="2" fill="white"/>
  <!-- 입 (웃음) -->
  <path d="M60,130 Q80,148 110,132" fill="none" stroke="#0277bd" stroke-width="3" stroke-linecap="round"/>
  <!-- 이빨 -->
  <polygon points="65,130 70,140 75,130" fill="white"/>
