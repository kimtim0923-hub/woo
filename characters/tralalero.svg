  <!-- 상어 꼬리 -->
  <polygon points="155,115 185,90 185,140" fill="#29b6f6"/>
  <!-- 상어 지느러미 (등) -->
  <polygon points="95,80 115,78 105,110" fill="#0288d1"/>
