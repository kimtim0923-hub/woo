<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- 배경 -->
  <circle cx="100" cy="100" r="95" fill="#e0f4ff" stroke="#4fc3f7" stroke-width="4"/>
